{% extends "base.html" %}
{% block content %}
<div>
  <h1 class="text-xl font-bold text-amber-400">{{ "user" | icon | safe }} Account Settings</h1>

  <section class="mb-8 p-4 bg-gray-900 border border-gray-800 rounded-lg">
    <h2 class="text-lg font-semibold text-amber-400 mb-4">Profile</h2>
    <p class="text-sm text-gray-400 mb-4">Update your email and display name.</p>
    <form
      hx-patch="/api/users/me"
      hx-target="#profile-feedback"
      hx-swap="innerHTML"
      hx-vals="js:{{ '{' }}email: document.getElementById('settings-email').value, username: document.getElementById('settings-username').value{{ '}' }}"
    >
      <div class="mb-3">
        <label for="settings-email" class="block text-sm font-medium text-gray-300 mb-1">Email</label>
        <input
          id="settings-email"
          type="email"
          name="email"
          value="{{ current_email }}"
          class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white"
        >
      </div>
      <div class="mb-4">
        <label for="settings-username" class="block text-sm font-medium text-gray-300 mb-1">Username</label>
        <input
          id="settings-username"
          type="text"
          name="username"
          value="{{ session.username }}"
          class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white"
        >
      </div>
      <div class="flex items-center gap-3">
        <button type="submit" class="bg-amber-600 hover:bg-amber-700 text-white font-semibold px-4 py-2 rounded">Save Changes</button>
        <span class="htmx-indicator" id="profile-indicator">
          <svg class="inline w-4 h-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
        </span>
      </div>
      <div id="profile-feedback" class="mt-2 text-sm"></div>
    </form>
  </section>

  <section class="mb-8 p-4 bg-gray-900 border border-gray-800 rounded-lg">
    <h2 class="text-lg font-semibold text-amber-400 mb-4">Avatar</h2>
    <div class="flex items-center gap-4 mb-4">
      {% if avatar_url %}
        <img src="{{ avatar_url }}" alt="Your avatar" class="w-16 h-16 rounded-full object-cover border-2 border-gray-700">
      {% else %}
        <div class="w-16 h-16 rounded-full bg-gray-800 border-2 border-gray-700 flex items-center justify-center text-gray-500 text-2xl">?</div>
      {% endif %}
    </div>
    <form
      hx-post="/api/users/me/avatar"
      hx-target="#avatar-feedback"
      hx-swap="innerHTML"
      hx-encoding="multipart/form-data"
      enctype="multipart/form-data"
      class="mb-3"
    >
      <div class="mb-3">
        <input
          type="file"
          name="avatar"
          accept="image/png,image/jpeg,image/webp"
          class="text-sm text-gray-300 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:bg-amber-600 file:text-white hover:file:bg-amber-700"
        >
      </div>
      <div class="flex items-center gap-3">
        <button type="submit" class="bg-amber-600 hover:bg-amber-700 text-white font-semibold px-4 py-2 rounded">Upload</button>
        <span class="htmx-indicator" id="avatar-indicator">
          <svg class="inline w-4 h-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
        </span>
      </div>
    </form>
    <div class="flex items-center gap-2">
      <button
        hx-delete="/api/users/me/avatar"
        hx-target="#avatar-feedback"
        hx-swap="innerHTML"
        class="text-red-400 hover:text-red-300 text-sm"
      >Remove Avatar</button>
    </div>
    <div id="avatar-feedback" class="mt-2 text-sm"></div>
  </section>

  <section class="mb-8 p-4 bg-gray-900 border border-gray-800 rounded-lg">
    <h2 class="text-lg font-semibold text-amber-400 mb-4">Password</h2>
    <form
      hx-post="/api/users/me/password"
      hx-target="#password-feedback"
      hx-swap="innerHTML"
      hx-vals="js:{{ '{' }}current_password: document.getElementById('pw-current').value, new_password: document.getElementById('pw-new').value{{ '}' }}"
    >
      <div class="mb-3">
        <label for="pw-current" class="block text-sm font-medium text-gray-300 mb-1">Current Password</label>
        <input id="pw-current" type="password" name="current_password" required class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white">
      </div>
      <div class="mb-4">
        <label for="pw-new" class="block text-sm font-medium text-gray-300 mb-1">New Password</label>
        <input id="pw-new" type="password" name="new_password" required minlength="8" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white">
      </div>
      <div class="flex items-center gap-3">
        <button type="submit" class="bg-amber-600 hover:bg-amber-700 text-white font-semibold px-4 py-2 rounded">Change Password</button>
        <span class="htmx-indicator" id="password-indicator">
          <svg class="inline w-4 h-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
        </span>
      </div>
      <div id="password-feedback" class="mt-2 text-sm"></div>
    </form>
  </section>
</div>
{% endblock %}
