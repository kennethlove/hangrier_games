{% extends "base.html" %}
{% block content %}
<div class="max-w-lg mx-auto py-8">
  <a href="/account" class="text-sm text-gray-400 hover:text-white mb-4 inline-block">
    {{ "arrow-left" | icon | safe }}
    Back to Account
  </a>

  <h1 class="text-2xl font-bold text-amber-400 mb-6">Create New Game</h1>

  {% if error %}
    <div class="mb-4 p-3 bg-red-900/30 border border-red-700 rounded-lg text-red-300 text-sm">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/games/new" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div>
      <label for="name" class="block text-sm font-medium text-gray-300 mb-1">Game Name</label>
      <input type="text" id="name" name="name" required minlength="1" maxlength="100" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-amber-500" placeholder="Enter game name">
    </div>

    <div>
      <label for="description" class="block text-sm font-medium text-gray-300 mb-1">Description (optional)</label>
      <textarea id="description" name="description" rows="3" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-white focus:outline-none focus:border-amber-500" placeholder="Describe your game"></textarea>
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" id="private" name="private" value="true" class="rounded bg-gray-800 border-gray-700 text-amber-500 focus:ring-amber-500">
      <label for="private" class="text-sm text-gray-300">Private game</label>
    </div>

    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold px-4 py-2 rounded relative" hx-indicator="#create-game-spinner">
      Create Game
      <span id="create-game-spinner" class="htmx-indicator absolute right-3 top-1/2 -translate-y-1/2">
        <svg class="inline w-4 h-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </span>
    </button>
  </form>
</div>
{% endblock %}
