name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.beads/**'
      - 'specs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.beads/**'
      - 'specs/**'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-fmt
          cache-on-failure: true
      - name: Stub web/src/env.rs for fmt
        # web/build.rs would normally generate web/src/env.rs from APP_*
        # env vars, but cargo fmt only needs the file to exist (so the
        # `mod env;` declaration resolves). A one-line stub is enough and
        # is far cheaper than a full `cargo check` to materialize it.
        run: printf '// stub for fmt; real file generated by web/build.rs\n' > web/src/env.rs
      - name: Format check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-clippy
          cache-on-failure: true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/assets/package-lock.json
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Build Tailwind CSS
        # web/src/components/app.rs references asset!("/assets/dist/main.css")
        # via the dioxus asset! macro, which fails at compile time if the
        # file is missing. Tailwind isn't a cargo build step, so we run it
        # explicitly here.
        run: just build-css
      - name: Clippy
        run: cargo clippy --workspace --tests -- -D warnings

  test-game:
    name: Test (game)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test-game
          cache-on-failure: true
      - name: Test (game)
        run: cargo test --package game

  test-shared:
    name: Test (shared)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test-shared
          cache-on-failure: true
      - name: Test (shared)
        run: cargo test --package shared

  test-api:
    name: Test (api integration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test-api
          cache-on-failure: true
      - name: Test (api integration)
        # api/tests/common/mod.rs spins up an in-memory SurrealDB per test
        # and sets SURREAL_MIG_PATH exactly once via OnceLock (bd-q077),
        # so the integration suite is safe to run with default parallelism.
        run: cargo test --package api --tests

  quality:
    # Aggregate gate so branch protection can keep requiring a single
    # "Quality" status check while the real work fans out across jobs above.
    name: Quality
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test-game, test-shared, test-api]
    if: always()
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [ "${{ needs.fmt.result }}" != "success" ] \
             || [ "${{ needs.clippy.result }}" != "success" ] \
             || [ "${{ needs.test-game.result }}" != "success" ] \
             || [ "${{ needs.test-shared.result }}" != "success" ] \
             || [ "${{ needs.test-api.result }}" != "success" ]; then
            echo "One or more required jobs failed:"
            echo "  fmt:         ${{ needs.fmt.result }}"
            echo "  clippy:      ${{ needs.clippy.result }}"
            echo "  test-game:   ${{ needs.test-game.result }}"
            echo "  test-shared: ${{ needs.test-shared.result }}"
            echo "  test-api:    ${{ needs.test-api.result }}"
            exit 1
          fi
